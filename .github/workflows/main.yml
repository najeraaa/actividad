name: Activitarea Python

on: [push]

jobs:
  python-job:
    runs-on: ubuntu-latest
    container: python:3.11

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3
      - name: Ver version de Python
        run: python --version
      - name: Crear archivo Python
        run: |
          echo 'print("Hola ")' > app.py
          echo 'print("dentro de un contenedor")' >> app.py
      - name: Ejecutar programa
        run: python app.py